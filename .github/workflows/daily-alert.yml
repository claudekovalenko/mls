name: MLS Daily Listing Alert

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send listing alert
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          LISTINGS_API_URL: ${{ secrets.LISTINGS_API_URL }}
          LISTINGS_API_KEY: ${{ secrets.LISTINGS_API_KEY }}
        run: python scripts/send_alert.py
